<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emdy International</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: white;
    overflow: hidden;
}

header {
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 42px;
    letter-spacing: 3px;
}

.tagline {
    color: gold;
    font-style: italic;
}

/* Lamps */
.lamp {
    position: absolute;
    width: 130px;
    cursor: pointer;
    animation: float 5s ease-in-out infinite;
    transition: transform 0.3s, filter 0.3s;
}

.lamp:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 15px gold);
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0px); }
}

/* Positions */
.lamp:nth-of-type(1) { top: 20%; left: 10%; }
.lamp:nth-of-type(2) { top: 50%; left: 20%; }
.lamp:nth-of-type(3) { top: 70%; left: 10%; }
.lamp:nth-of-type(4) { top: 30%; left: 40%; }
.lamp:nth-of-type(5) { top: 65%; left: 35%; }
.lamp:nth-of-type(6) { top: 20%; left: 60%; }
.lamp:nth-of-type(7) { top: 50%; left: 70%; }
.lamp:nth-of-type(8) { top: 75%; left: 55%; }
.lamp:nth-of-type(9) { top: 35%; left: 80%; }
.lamp:nth-of-type(10){ top: 65%; left: 85%; }

/* Price Box */
#priceBox {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    padding: 15px 30px;
    border-radius: 12px;
    font-size: 22px;
    display: none;
    border: 1px solid gold;
}
</style>

</head>
<body>

<header>
    <h1>Emdy International</h1>
    <p class="tagline">Curator of Luxury Radiance</p>
</header>

<!-- Lamps (LOCAL IMAGES) -->
<img src="LAMP1.png" class="lamp" onclick="showPrice(979)">
<img src="LAMP2.png" class="lamp" onclick="showPrice(949)">
<img src="LAMP3.png" class="lamp" onclick="showPrice(899)">
<img src="LAMP4.png" class="lamp" onclick="showPrice(849)">
<img src="LAMP5.png" class="lamp" onclick="showPrice(819)">
<img src="LAMP6.png" class="lamp" onclick="showPrice(898)">
<img src="LAMP7.png" class="lamp" onclick="showPrice(799)">
<img src="LAMP8.png" class="lamp" onclick="showPrice(749)">
<img src="LAMP9.png" class="lamp" onclick="showPrice(699)">
<img src="LAMP10.png" class="lamp" onclick="showPrice(649)">

<div id="priceBox"></div>

<script>
function showPrice(price) {
    const box = document.getElementById("priceBox");
    box.innerHTML = "✨ Price: ₹" + price;
    box.style.display = "block";

    setTimeout(() => {
        box.style.display = "none";
    }, 2000);
}
</script>

</body>
</html>
